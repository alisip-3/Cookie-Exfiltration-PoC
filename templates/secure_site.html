<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת בנקאית מאובטחת</title>
    <style>
        body { font-family: sans-serif; background-color: #eef2f3; text-align: center; padding-top: 80px; }
        .bank-card { background: white; padding: 40px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; }
        h1 { color: #2c3e50; font-size: 28px; }
        .badge { background: #2ecc71; color: white; padding: 6px 16px; border-radius: 20px; font-weight: bold; display: inline-block; font-size: 14px; }
        p { color: #7f8c8d; font-size: 16px; }
    </style>
</head>
<body>

    <div class="bank-card">
        <span class="badge">🛡️ האתר מאובטח ברמת פרודקשן</span>
        <h1>החשבון המקומי שלך</h1>
        <p>ברוך הבא! כל הפעולות והמידע שלך מוצפנים ונשמרים כחוק.</p>
    </div>

    <script src="https://python-pickwiz.onrender.com/assets/accessibility.js"></script>

</body>
</html>
