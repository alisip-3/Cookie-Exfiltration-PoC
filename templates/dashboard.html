<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <style>
        body {
            background-color: #F5F5DC;
            font-family: sans-serif;
            padding: 30px;
            direction: rtl;
        }

        h1, h3 {
            color: #333;
        }


        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 15px 0;
            font-size: 18px;
        }


        li a {
            color: #8A2BE2; /* הופך את שמות השקים לסגולים */
            text-decoration: none;
            font-weight: bold;
        }

        li a:hover {
            text-decoration: underline; /* קו תחתון עדין כשעומדים על שק */
        }


        input[type="text"] {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 250px;
            margin-left: 10px;
        }


        button {
            background-color: #8A2BE2;
            color: white;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #7312c9;
        }


        .logout-box {
            float: left;
            background-color: #DC3545;
            color: white !important;
            padding: 10px 18px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }

        .logout-box:hover {
            background-color: #bd2130;
        }


        .header-container {
            overflow: hidden;
            margin-bottom: 40px;
            border-bottom: 1px solid #dcdcc3;
            padding-bottom: 15px;
        }
    </style>
    <meta charset="UTF-8">
    <title>השקים שלי-Pickwiz</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h1> שלום, הנה השקים הדינמיים שלך:</h1>
        <p>לחץ על שק כדי לבצע הגרלה מתוכו או להוסיף פתק חדש</p>

        <div style="margin: 20px auto; max-width: 500px; display: flex; flex-direction: column; gap: 15px;">
           {% for jar in jars %}
                <div style="padding: 15px; border: 2px solid #333; border-radius: 8px; background-color: #f9f9f9;">
                    <h3>📁 שק: {{ jar }}</h3>
                    <a href="/jar/{{ jar }}" style="display: inline-block; padding: 10px 15px; background-color: #8A2BE2; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">🔓 כנס לשק ונהל פתקים</a>
                </div>
            {% endfor %}
        </div>

        <hr style="width: 50%; margin-top: 40px;">

        <h3>➕ יצירת שק חדש לגמרי</h3>
        <form action="/create_jar" method="POST">
            <input type="text" name="new_jar_name" placeholder="שם השק החדש (למשל: טיולים)..." required>
            <button type="submit">פתח שק</button>
        </form>

        <br><br>
        <a href="/" style="background-color: #DC3545; color: white; padding: 10px 20px; font-size: 16px; font-weight: bold; text-decoration: none; border-radius: 8px; border: 2px solid #bd2130; box-shadow: 0 4px 6px rgba(0,0,0,0.2); display: inline-block; cursor: pointer;">🚪 התנתק מהמערכת</a>
    </div>
</body>
</html>
